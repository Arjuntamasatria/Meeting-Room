# ============================================================
#  turnserver.conf — Konfigurasi coturn untuk Project Jarmul
#  Kelompok 3 | Jaringan Multimedia | Universitas Udayana 2026
# ============================================================
#
#  Cara pakai:
#    Windows  : turnserver.exe -c turnserver.conf
#    Linux    : turnserver -c turnserver.conf
#    Verifikasi: lihat README-infrastruktur.md bagian 1.3
# ============================================================

# ------------------------------------------------------------
# JARINGAN
# ------------------------------------------------------------

# Port TURN standar (UDP + TCP)
listening-port=3478

# Port TURN terenkripsi TLS (opsional, aktifkan jika perlu HTTPS)
# tls-listening-port=5349

# Alamat IP yang di-listen.
# Ganti 0.0.0.0 dengan IP spesifik interface jika ada beberapa NIC.
listening-ip=0.0.0.0

# IP publik mesin ini (wajib diisi jika mesin berada di belakang NAT/router).
# Contoh: external-ip=203.0.113.10
# Untuk pengujian LAN-only, baris ini bisa dikosongkan (hapus tanda #).
# external-ip=YOUR_PUBLIC_IP

# Rentang port relay UDP yang digunakan saat membangun sesi TURN.
min-port=49152
max-port=65535

# ------------------------------------------------------------
# REALM & CREDENTIALS
# ------------------------------------------------------------

# Realm — nama domain fiktif untuk autentikasi; harus sama dengan
# konfigurasi ICE_SERVERS di webrtc-client.js
realm=webrtc.local

# Autentikasi long-term credential (username:password statik).
# Format: user=<username>:<password>
user=webrtc:webrtcpass

# Aktifkan autentikasi (jangan gunakan --no-auth di produksi)
lt-cred-mech

# ------------------------------------------------------------
# FINGERPRINT & PROTOKOL
# ------------------------------------------------------------

# Aktifkan STUN fingerprint — dibutuhkan oleh beberapa browser
fingerprint

# Izinkan koneksi melalui TCP (fallback saat UDP diblokir firewall)
# Aktifkan dengan menghapus tanda #
# no-tcp-relay

# ------------------------------------------------------------
# LOGGING
# ------------------------------------------------------------

# File log (kosongkan untuk output ke stdout)
log-file=/var/log/turnserver.log

# Jika di Windows, gunakan path Windows:
# log-file=C:\coturn\logs\turnserver.log

# Level verbositas: 0 = default, --verbose = detail, --Verbose = sangat detail
# verbose

# Jangan log request berhasil (kurangi noise di log)
# no-stdout-log

# ------------------------------------------------------------
# KEAMANAN (untuk pengujian LAN — tidak dibutuhkan di produksi)
# ------------------------------------------------------------

# Izinkan loopback (127.x.x.x) sebagai relay — hanya untuk testing lokal
allow-loopback-peers

# Izinkan relay ke alamat multicast
# no-multicast-peers

# Batasi relay hanya ke IP terpercaya (opsional, lebih aman di produksi)
# denied-peer-ip=10.0.0.0-10.255.255.255
# denied-peer-ip=192.168.0.0-192.168.255.255

# ------------------------------------------------------------
# STUN (built-in)
# ------------------------------------------------------------
# coturn juga berfungsi sebagai STUN server secara bawaan pada port yang sama.
# Tidak perlu konfigurasi tambahan untuk STUN.
